name: Publish to PyPI

# Publishing is gated on pushing a version tag (e.g. `git tag v0.1.0 && git
# push origin v0.1.0`) — never on a PR or a merge to main. Merging code does
# not release; tagging does. The tag must match the version in pyproject.toml.
#
# Actions are pinned to commit SHAs (not moving tags) because this is the
# highest-privilege workflow in the repo — it mints OIDC tokens and publishes.
# Version comments mark what each SHA was, so renovating them stays readable.
on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the floor and ceiling of the declared support range
        # (requires-python = ">=3.10"). The publish workflow is the only CI,
        # so without this matrix nothing exercises 3.10/3.11.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  build:
    name: Build & verify distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          # 3.11+ guarantees the stdlib `tomllib` used by the version guard.
          python-version: "3.12"

      - name: Install tooling
        run: python -m pip install --upgrade build twine

      - name: Guard — tag must match pyproject version
        # Refuse to release if `v1.2.3` was pushed but pyproject says 1.2.4.
        # Catches the classic "forgot to bump the version" mistake before
        # anything reaches PyPI (where versions are immutable).
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          echo "tag=$TAG  pyproject=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::git tag ($TAG) does not match pyproject version ($PKG)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment lets you add a manual approval gate or restrict
    # which tags can deploy, in the repo's Settings → Environments.
    environment: pypi
    permissions:
      # Required for Trusted Publishing (OIDC). No API token is stored —
      # PyPI verifies this workflow's identity directly.
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish
        # NOT SHA-pinned on purpose: this is a Docker action whose image is
        # published to GHCR tagged by RELEASE (e.g. :release-v1, :v1.x), not
        # by commit SHA. Pinning to a SHA makes the runner pull a nonexistent
        # image tag → "docker: manifest unknown". `release/v1` is PyPA's
        # supported, security-maintained ref for this action.
        uses: pypa/gh-action-pypi-publish@release/v1
